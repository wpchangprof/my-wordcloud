<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時文字雲產生器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #2c3e50;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            margin-top: 20px;
        }
        .input-section, .output-section {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-size: 16px;
        }
        #canvas-container {
            width: 100%;
            height: 400px;
            background: #fff;
            border: 1px dashed #aaa;
            border-radius: 4px;
            position: relative;
            margin-bottom: 20px;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 150px;
            font-size: 14px;
            margin: 0;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }
    </style>
</head>
<body>

    <h1>即時文字雲產生器</h1>
    <p>在左側輸入或貼上文字，右側會即時渲染文字雲，並將資料轉換為 JSON 格式。</p>

    <div class="container">
        <div class="input-section">
            <label for="textInput">請輸入文章或字詞（空白或逗號分隔）：</label>
            <textarea id="textInput" placeholder="請在這裡輸入文字... 例如：蘋果 芭樂 蘋果 香蕉 芭樂 蘋果 西瓜"></textarea>
        </div>

        <div class="output-section">
            <label>文字雲預覽：</label>
            <div id="canvas-container">
                <canvas id="cloudCanvas"></canvas>
            </div>

            <label>後台儲存的 JSON 資料：</label>
            <pre id="jsonOutput">[]</pre>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const canvas = document.getElementById('cloudCanvas');
        const jsonOutput = document.getElementById('jsonOutput');
        let debounceTimer;

        // 設定畫布解析度，避免模糊
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        // 核心邏輯：處理文字、轉成 JSON 並渲染文字雲
        function generateWordCloud() {
            const text = textInput.value.trim();
            if (!text) {
                // 清空
                WordCloud(canvas, { list: [] });
                jsonOutput.textContent = "[]";
                return;
            }

            // 1. 斷詞與計算詞頻 (這裡採用簡易的空白、標點符號斷詞)
            // 如果是純中文且沒空格，建議手動用空格分開，或是未來結合斷詞套件
            const words = text.split(/[\s,，.。!！?？、;；\n]+/);
            const frequencyMap = {};

            words.forEach(word => {
                word = word.trim();
                if (word.length > 0) {
                    frequencyMap[word] = (frequencyMap[word] || 0) + 1;
                }
            });

            // 2. 轉換成 wordcloud2.js 所需的 [ ['詞', 權重], ... ] 格式
            // 同時這也是準備轉成 JSON 的基礎結構
            const wordArray = Object.keys(frequencyMap).map(key => {
                return [key, frequencyMap[key]];
            });

            // 依頻率由大到小排序
            wordArray.sort((a, b) => b[1] - a[1]);

            // 3. 將資料轉為 JSON 格式字串並顯示在網頁上（模擬後端儲存格式）
            const jsonStructure = wordArray.map(item => ({
                word: item[0],
                weight: item[1]
            }));
            jsonOutput.textContent = JSON.stringify(jsonStructure, null, 2);

            // 4. 計算權重縮放比例，避免字體過大或過小
            const maxCount = wordArray[0] ? wordArray[0][1] : 1;
            const weightFactor = Math.max(10, Math.min(60, 400 / maxCount)); 

            // 5. 渲染文字雲
            WordCloud(canvas, {
                list: wordArray,
                gridSize: 8,
                weightFactor: weightFactor,
                fontFamily: 'Finger Paint, Inter, sans-serif',
                color: 'random-dark',
                backgroundColor: '#ffffff',
                rotateRatio: 0.3
            });
        }

        // 防抖動 (Debounce) 機制：避免使用者每打一個字就重新計算渲染，造成卡頓
        textInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(generateWordCloud, 400); // 停止打字 0.4 秒後才執行
        });

        // 初始化
        window.addEventListener('resize', () => {
            resizeCanvas();
            generateWordCloud();
        });
        
        // 延遲初始化確保容器尺寸正確
        setTimeout(() => {
            resizeCanvas();
            generateWordCloud();
        }, 100);
    </script>
</body>
</html>
